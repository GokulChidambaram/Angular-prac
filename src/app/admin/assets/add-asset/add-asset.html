<h2>Add New Asset</h2>
<form [formGroup]="assetForm" (ngSubmit)="save()">
<input formControlName="name" placeholder="Asset Name" />
<input formControlName="modelNo" placeholder="Model No" />
<!-- Category from DB -->
<select formControlName="categoryID">
<option value="" disabled>Select Category</option>
<option *ngFor="let c of categories" [value]="c.categoryID">
 
      {{ c.name }}
</option>
</select>
<input formControlName="tag" placeholder="Asset Tag" />
<textarea formControlName="description" placeholder="Description"></textarea>
<div class="field">
<label>Date of Purchase</label>
<input type="date" formControlName="purchaseDate" />
</div>
<input type="number" formControlName="cost" placeholder="Unit Price" />
<!-- Plain text (NOT dropdowns) -->
<input formControlName="departmentName" placeholder="Department Name" />
<input formControlName="supplierName" placeholder="Supplier Name" />
<button type="submit">Save</button>
</form>
