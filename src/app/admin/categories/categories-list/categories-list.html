<div class="container">
  <div class="header">
    <div class="title-group">
      <h2>Category Management</h2>
      <span class="count-badge">{{ categories.length }} Total Categories</span>
    </div>
    <button class="btn-add" (click)="navigateToAdd()">+ Add Category</button>
  </div>

  <div *ngIf="isLoading" class="loader-box">
    <p>Loading categories...</p>
  </div>

  <div class="content" *ngIf="!isLoading">
    <table *ngIf="categories.length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categories">
          <td>{{ cat.categoryID }}</td>
          <td>{{ cat.name }}</td>
          <td>{{ cat.createdAt | date:'short' }}</td>
          <td>
            <button class="btn-edit" (click)="onEdit(cat.categoryID)">Edit</button>
            <button class="btn-delete" (click)="onDelete(cat.categoryID)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="categories.length === 0" class="no-data">
      No categories found.
    </div>
  </div>
</div>
