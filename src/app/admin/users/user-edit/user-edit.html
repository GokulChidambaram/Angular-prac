<div class="edit-wrapper">
  <div class="form-card">
    <div class="form-header">
      <div class="icon-circle"><span>📝</span></div>
      <div class="text-group">
        <h2>Edit User Profile</h2>
        <p>Updating User ID: #{{ userId }}</p>
      </div>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="onSubmit()">
      <div class="input-grid">
        <div class="input-box">
          <label>Full Name</label>
          <input type="text" formControlName="name">
        </div>

        <div class="input-box">
          <label>Email Address</label>
          <input type="email" formControlName="email">
        </div>

        <div class="input-box">
          <label>System Role</label>
          <select formControlName="roleID">
            <option *ngFor="let r of roles" [value]="r.roleID">{{ r.name }}</option>
          </select>
        </div>

        <div class="input-box">
          <label>Department</label>
          <input type="text" formControlName="department">
        </div>

        <div class="input-box full-width">
          <label>Account Status</label>
          <select formControlName="status">
            <option [value]="0">Active</option>
            <option [value]="1">Inactive / Suspended</option>
          </select>
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="btn-secondary" (click)="router.navigate(['/admin/users'])">Discard</button>
        <button type="submit" class="btn-primary" [disabled]="editForm.invalid">Update User</button>
      </div>
    </form>
  </div>
</div>
