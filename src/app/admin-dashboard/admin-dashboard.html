<div class="dashboard-container">
<!-- Header -->
<div class="dashboard-header">
<h2>Admin Dashboard</h2>
<button class="logout-btn" (click)="logout()">Sign Out</button>
</div>
<!-- Cards -->
<div class="cards">
<div class="card">
<h3>Assets</h3>
<p>{{ assetCount }}</p>
</div>
<div class="card">
<h3>Asset Requests</h3>
<p>{{ assetRequestCount }}</p>
</div>
<div class="card">
<h3>Issues</h3>
<p>{{ issueCount }}</p>
</div>
<div class="card">
<h3>Employees</h3>
<p>{{ employeeCount }}</p>
</div>
</div>
<!-- Actions -->
<div class="actions">
<button>Add New Asset</button>
<button>Manage Employees</button>
<button>View Reports</button>
</div>
</div>
